services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      FORGE_DB_PATH: /data/forge.sqlite
    volumes:
      - api-data:/data
    ports:
      - "9092:9092"
  seo:
    build:
      context: .
      dockerfile: Dockerfile.seo
    environment:
      BOG_SEO_UPSTREAM: http://web
      BOG_SEO_CANONICAL_BASE: https://example.com
      BOG_SEO_WARMUP: 'true'
    depends_on:
      - web
    ports:
      - "3334:3334"

volumes:
  api-data:
