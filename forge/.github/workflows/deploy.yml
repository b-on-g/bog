name: $bog_forge_app

permissions: write-all

on:
    workflow_dispatch:
    push:
    pull_request:
    delete:

concurrency:
    group: deploy-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: hyoo-ru/mam_build@master2
              with:
                  package: "bog/forge"
                  modules: 'app'

            - uses: hyoo-ru/gh-deploy@v4.4.1
              if: github.ref == 'refs/heads/main'
              with:
                  folder: "bog/forge/app/-"

            - name: Deploy feature branch
              if: startsWith(github.ref, 'refs/heads/feature/')
              uses: hyoo-ru/gh-deploy@v4.4.1
              with:
                  folder: "bog/forge/-"
                  target-folder: ${{ github.ref_name }}

            - uses: b-on-g/mol-prerender-action@main
              if: startsWith(github.ref, 'refs/tags/')
              continue-on-error: true
              with:
                  folder: "bog/forge/app/-"
                  base-url: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
                  screens: |
                      home

            - name: Build $bog_seo
              if: startsWith(github.ref, 'refs/tags/')
              run: npx mam bog/seo

            - name: Serve static and dump prerendered HTML
              if: startsWith(github.ref, 'refs/tags/')
              continue-on-error: true
              run: |
                  npx --yes serve -s "bog/forge/app/-" -l 9090 > /tmp/serve.log 2>&1 &
                  SERVE_PID=$!
                  sleep 2
                  BOG_SEO_UPSTREAM=http://localhost:9090 \
                  BOG_SEO_CANONICAL_BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
                  BOG_SEO_DUMP_DIR="bog/forge/app/-/_seo" \
                  BOG_SEO_WARMUP=true \
                  node bog/seo/-/node.js
                  kill $SERVE_PID || true
                  if [ -d "bog/forge/app/-/_seo" ]; then
                      cp -rn "bog/forge/app/-/_seo/"* "bog/forge/app/-/" || true
                      rm -rf "bog/forge/app/-/_seo"
                  fi

    cleanup:
        if: github.event_name == 'delete' && startsWith(github.event.ref, 'feature/')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: gh-pages

            - name: Remove feature folder
              run: |
                  BRANCH_NAME="${{ github.event.ref }}"
                  FOLDER="feature/${BRANCH_NAME#feature/}"
                  if [ -d "$FOLDER" ]; then
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git rm -rf "$FOLDER"
                    git commit -m "Clean up preview for deleted branch: $BRANCH_NAME"
                    git push
                  fi
